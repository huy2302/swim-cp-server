spring.application.name=swim-server
# 1. MySQL Connection Parameters
# Note: swim is the name of the database you created in the previous steps
spring.datasource.url=jdbc:mysql://localhost:3306/swim?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1

# 2. Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Hibernate Configuration (Automatically create tables from Java code)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 4. Server Port
server.port=8080
